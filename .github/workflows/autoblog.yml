name: AutoBlog Generator

on:
  schedule:
    - cron: "0 12 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "articles / networth / both"
        required: false
        default: "articles"
      articles_count:
        description: "Articles per run"
        required: false
        default: "15"
      profiles_count:
        description: "Net worth profiles per run"
        required: false
        default: "50"

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate blog articles
        if: ${{ github.event.inputs.mode != 'networth' }}
        env:
          CLAUDE_API_KEY:   ${{ secrets.CLAUDE_API_KEY }}
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
          UNSPLASH_KEY:     ${{ secrets.UNSPLASH_KEY }}
          SITE_URL:         ${{ secrets.SITE_URL }}
          SITE_NAME:        ${{ secrets.SITE_NAME }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_count || secrets.ARTICLES_PER_RUN || '15' }}
          MANUAL_ROTATION:  ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python generate_articles.py

      - name: Generate net worth profiles
        if: ${{ github.event.inputs.mode == 'networth' || github.event.inputs.mode == 'both' }}
        env:
          CLAUDE_API_KEY:   ${{ secrets.CLAUDE_API_KEY }}
          SITE_URL:         ${{ secrets.SITE_URL }}
          SITE_NAME:        ${{ secrets.SITE_NAME }}
          PROFILES_PER_RUN: ${{ github.event.inputs.profiles_count || '50' }}
        run: python generate_networth.py

      - name: Copy static assets
        run: |
          cp style.css output/style.css
          cp robots.txt output/robots.txt
          cp .htaccess output/.htaccess

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add output/
          git diff --staged --quiet || git commit -m "Auto: generate content $(date -u '+%Y-%m-%d %H:%M')"
          git push
