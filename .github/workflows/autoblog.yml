name: AutoBlog Generator

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "articles / networth / both"
        required: false
        default: "articles"
      articles_count:
        description: "Articles per run"
        required: false
        default: "10"

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore cached state
        uses: actions/cache@v4
        with:
          path: |
            output/published.json
            output/posts_index.json
          key: autoblog-state-${{ github.run_id }}
          restore-keys: |
            autoblog-state-

      - name: Generate articles
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          CLAUDE_API_KEY:   ${{ secrets.CLAUDE_API_KEY }}
          UNSPLASH_KEY:     ${{ secrets.UNSPLASH_KEY }}
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
          SITE_URL:         ${{ secrets.SITE_URL }}
          SITE_NAME:        ${{ secrets.SITE_NAME }}
          SITE_TAGLINE:     ${{ secrets.SITE_TAGLINE }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_count || '10' }}
        run: python generate_articles.py

      - name: Copy static assets
        run: |
          cp style.css output/style.css
          cp robots.txt output/robots.txt

      - name: Commit output to GitHub
        run: |
          git config user.name "AutoBlog Bot"
          git config user.email "bot@autoblog.com"
          git add output/
          git diff --staged --quiet || git commit -m "Auto: Add new articles $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Save state
        uses: actions/cache@v4
        with:
          path: |
            output/published.json
            output/posts_index.json
          key: autoblog-state-${{ github.run_id }}
