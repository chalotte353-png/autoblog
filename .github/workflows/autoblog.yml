name: AutoBlog Generator

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
    - cron: "0 12 * * *"
    - cron: "0 15 * * *"
    - cron: "0 18 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "articles / networth / both"
        required: false
        default: "both"
      articles_count:
        description: "Articles per run"
        required: false
        default: "10"
      profiles_count:
        description: "Net worth profiles per run"
        required: false
        default: "10"

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install SSH client
        run: sudo apt-get install -y openssh-client

      - name: Restore output cache
        uses: actions/cache@v4
        with:
          path: |
            output/published.json
            output/posts_index.json
            output/networth_done.json
            output/networth_index.json
          key: autoblog-state-${{ github.run_id }}
          restore-keys: |
            autoblog-state-

      - name: Generate blog articles
        if: ${{ github.event.inputs.mode != 'networth' }}
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
          SITE_URL:         ${{ secrets.SITE_URL }}
          SITE_NAME:        ${{ secrets.SITE_NAME }}
          SITE_TAGLINE:     ${{ secrets.SITE_TAGLINE }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_count || '10' }}
        run: python generate_articles.py

      - name: Generate net worth profiles
        if: ${{ github.event.inputs.mode != 'articles' }}
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          SITE_URL:         ${{ secrets.SITE_URL }}
          SITE_NAME:        ${{ secrets.SITE_NAME }}
          PROFILES_PER_RUN: ${{ github.event.inputs.profiles_count || '10' }}
        run: python generate_networth.py

      - name: Copy static assets
        run: |
          cp style.css output/style.css
          cp robots.txt output/robots.txt

      - name: Upload via SSH/SCP
        env:
          SSH_HOST:        ${{ secrets.SSH_HOST }}
          SSH_USER:        ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          CPANEL_DIR:      ${{ secrets.CPANEL_DIR }}
        run: python ftp_upload.py

      - name: Save output state
        uses: actions/cache@v4
        with:
          path: |
            output/published.json
            output/posts_index.json
            output/networth_done.json
            output/networth_index.json
          key: autoblog-state-${{ github.run_id }}
