name: AutoBlog Generator

on:
  # schedule:
  #   - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      articles_count:
        description: "Articles per run"
        required: false
        default: "2"
      keywords:
        description: "Custom keywords (comma separated)"
        required: false
        default: ""

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore existing posts
        run: mkdir -p output/posts

      - name: Generate blog articles
        env:
          GROQ_API_KEY_1:   ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:   ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:   ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4:   ${{ secrets.GROQ_API_KEY_4 }}
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
          UNSPLASH_KEY:     ${{ secrets.UNSPLASH_KEY }}
          SITE_URL:         ${{ secrets.SITE_URL }}
          SITE_NAME:        ${{ secrets.SITE_NAME }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_count || '2' }}
          MANUAL_ROTATION:  ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          CUSTOM_KEYWORDS:  ${{ github.event.inputs.keywords }}
        run: python generate_articles.py

      - name: Generate coin pages
        env:
          GROQ_API_KEY_1:   ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2:   ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:   ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4:   ${{ secrets.GROQ_API_KEY_4 }}
          SITE_URL:         ${{ secrets.SITE_URL }}
          SITE_NAME:        ${{ secrets.SITE_NAME }}
        run: python generate_coins.py

      - name: Copy static assets
        run: |
          cp style.css output/style.css
          cp robots.txt output/robots.txt
          cp .htaccess output/.htaccess

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add output/
          git diff --staged --quiet || git commit -m "Auto: generate content $(date -u '+%Y-%m-%d %H:%M')"
          git push
