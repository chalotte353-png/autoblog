name: Inject Internal Links (One-Time)

on:
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Run inject script
        run: python inject_links_old_posts.py

      - name: Commit and push updated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/posts/
          git diff --staged --quiet || git commit -m "SEO: inject internal links in all posts"
          git push
